  - "GitHub Copilot"

ai_usage_summary: |
  Used Gemini for algorithmic strategy planning, sorting logic formulation, 
  and structural deck outline construction. Used Copilot for basic code completion.
  No candidate profile data was exposed to external APIs.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  An optimized, deterministic rule-based ranking engine engineered for zero-network 
  CPU environments. Features explicit cross-signal validation targeting heuristic 
  traps and honeypots. Evaluates candidates using an multi-signal algorithm: 
  explicit qualification mapping, progression velocity tracking, and a multiplicative 
  behavioral signal modifier utilizing Redrob metrics like recruiter response rates 
  to scale baseline fit scores. Fully handles impossible candidate profile anomalies.

